[trading]
mode = "paper"
timeframe = "15m"
market_poll_interval_seconds = 4.0
signal_interval_seconds = 0.25
settlement_poll_interval_seconds = 5.0
dashboard_interval_seconds = 1.0
lookback_windows = 1
lookahead_windows = 2
opening_capture_grace_seconds = 20
settlement_grace_seconds = 2

# Live trading is refused unless all three are true and mode = "live".
live_enable_orders = false
live_confirm_real_money = false
live_confirm_polymarket_terms = false

[risk]
bankroll_usd = 1000.0
kelly_fraction = 0.25
max_position_usd = 25.0
max_position_fraction = 0.03
min_order_usd = 5.0
max_daily_drawdown_usd = 75.0
min_signal_distance_bps = 4.0
probability_scale_bps = 12.0
probability_cap = 0.88
min_probability_edge = 0.04
min_entry_price = 0.05
max_entry_price = 0.92
min_elapsed_seconds = 1.0
max_seconds_to_expiry = 8.0
max_open_exposure_usd = 100.0
max_trades_per_hour = 12
max_tick_age_ms = 2500
max_tick_feed_lag_ms = 10000
risk_day_timezone = "America/New_York"

[polymarket]
gamma_base_url = "https://gamma-api.polymarket.com"
clob_base_url = "https://clob.polymarket.com"
market_ws_url = "wss://ws-subscriptions-clob.polymarket.com/ws/market"
rtds_ws_url = "wss://ws-live-data.polymarket.com"
chain_id = 137
market_ws_ping_payload = "PING"

[telegram]
enabled = false
bot_token_env = "TELEGRAM_BOT_TOKEN"
chat_id_env = "TELEGRAM_CHAT_ID"
heartbeat_interval_seconds = 3600

[telemetry]
enabled = true
path = "data/events.jsonl"
queue_max = 20000
storage_queue_max = 20000
batch_size = 100
flush_interval_seconds = 0.25
record_ticks = true
record_orderbook = true
record_rejected_signals = true

[[assets]]
symbol = "BTC"
slug_prefix = "btc"
chainlink_symbol = "btc/usd"
enabled = true

[[assets]]
symbol = "ETH"
slug_prefix = "eth"
chainlink_symbol = "eth/usd"
enabled = true

[[assets]]
symbol = "SOL"
slug_prefix = "sol"
chainlink_symbol = "sol/usd"
enabled = true

[[assets]]
symbol = "XRP"
slug_prefix = "xrp"
chainlink_symbol = "xrp/usd"
enabled = true
